# =============================================================================
# Foot Terminal Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Main Settings
# -----------------------------------------------------------------------------
shell=fish
term=xterm-256color
title=foot

# -----------------------------------------------------------------------------
# Font & Display
# -----------------------------------------------------------------------------
font=SpaceMono Nerd Font:size=16
font-bold=SpaceMono Nerd Font:weight=bold:size=16
font-italic=Victor Mono:slant=italic:size=16
font-bold-italic=Victor Mono:weight=bold:slant=italic:size=16
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no

# Font rendering improvements
[tweak]
font-monospace-warn=no
sixel=yes
overflowing-glyphs=yes
grapheme-shaping=yes

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------
[tweak]
sixel=yes

# -----------------------------------------------------------------------------
# Colors & Appearance
# -----------------------------------------------------------------------------
[colors]
alpha=0.98

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
[scrollback]
lines=10000

# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------
[cursor]
style=beam
blink=no
beam-thickness=1.5
# underline-thickness=<font underline thickness>

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------
[key-bindings]
# Navigation
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down

# Clipboard
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
# primary-paste=Shift+Insert

# Search
search-start=Control+f

# Font size
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

# -----------------------------------------------------------------------------
# Search Bindings
# -----------------------------------------------------------------------------
[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
delete-prev-word=Control+BackSpace
