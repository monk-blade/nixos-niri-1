[main]
# Terminal to launch programs that require one
terminal=ghostty
# Prompt text with better visual hierarchy and spacing
prompt=❯  
# More results for better discoverability
lines=15
# Wider launcher for better readability
width=50
# Better padding for balanced look
horizontal-pad=50
vertical-pad=30
# Inner padding between items
inner-pad=8
# Enhanced typography - matching your SpaceMono theme
font=SpaceMono Nerd Font:size=8:weight=medium
# Icon theme - try multiple fallbacks for better compatibility
icon-theme=Papirus,Adwaita,hicolor
# Show actions for more functionality
show-actions=yes
# Layer (overlay puts it above everything)
layer=overlay
# Anchor to center the launcher
anchor=center
# Fields to match against (more comprehensive search)
fields=filename,name,generic
# Case sensitivity for better matching
case-sensitive=no
# Better filtering
filter-desktop=yes
# Launch immediately when only one result
launch-immediately=no
# Better icon handling
icons-enabled=yes
# Icon size for better visibility
icon-size=24
# Fuzzy matching for better search experience
fuzzy=yes
# Password character (if used as password prompt)
password-character=*

# Colors (these will be overridden by Stylix if you're using it)
[colors]
background=141420ff
text=cdd6f4ff
match=f38ba8ff
selection=313244ff
selection-text=cdd6f4ff
selection-match=f9e2afff
border=b4befeff

[border]
width=1
radius=0

[dmenu]
# Exit immediately after launching
exit-immediately-if-empty=no
# Better prompt for dmenu mode
prompt=❯  
# Case insensitive for dmenu
case-sensitive=no

[key-bindings]
# Enhanced navigation
# Cancel with escape or ctrl+c
cancel=Escape Control+c Control+g
# Execute selected item
execute=Return KP_Enter Control+m
# Execute selected item in terminal
execute-in-terminal=Control+Return Control+KP_Enter
# Navigate up/down
cursor-up=Up Control+k Control+p
cursor-down=Down Control+j Control+n
# Page up/down for faster navigation
page-up=Page_Up Control+u
page-down=Page_Down Control+d
# Clear input
delete-line=Control+a
# Delete word backward
delete-word=Control+w
# Move cursor to beginning/end
cursor-home=Home Control+a
cursor-end=End Control+e

[text-input]
# Better input handling
placeholder-text=Type to search...
# Cursor appearance
cursor=yes
