[main]
# Terminal to launch programs that require one
terminal=foot

# Prompt text
prompt=❯

# Number of results to display
lines=15

# Width of the launcher (in characters)
width=50

# Horizontal alignment: left, center, right
horizontal-pad=40

# Vertical alignment: top, center, bottom
vertical-pad=40

# Font configuration
font=JetBrainsMono Nerd Font:size=12

# Icon theme
icon-theme=Papirus-Dark

# Show actions
show-actions=yes

# Layer (overlay puts it above everything)
layer=overlay

# Anchor to center the launcher
anchor=center

# Colors (these will be overridden by Stylix if you're using it)
[colors]
background=1e1e2eff
text=cdd6f4ff
match=f38ba8ff
selection=313244ff
selection-text=cdd6f4ff
selection-match=f9e2afff
border=b4befeff

[border]
width=2
radius=8

[dmenu]
# Exit immediately after launching
exit-immediately-if-empty=no
